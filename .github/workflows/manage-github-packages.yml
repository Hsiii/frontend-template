name: Manage GitHub Packages

on:
    workflow_dispatch:

permissions:
    contents: read
    packages: write

jobs:
    publish-create-alias:
        runs-on: ubuntu-latest
        steps:
            - name: Check out repository
              uses: actions/checkout@v4

            - name: Set up Node
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  registry-url: https://npm.pkg.github.com
                  scope: '@hsiii'

            - name: Build scoped package
              run: |
                  node <<'EOF'
                  const fs = require('node:fs');
                  const path = require('node:path');

                  const sourceDir = path.resolve('packages/create-hsi-app');
                  const outputDir = path.resolve('.tmp-github-create-hsi-app');

                  fs.mkdirSync(path.join(outputDir, 'bin'), { recursive: true });
                  fs.copyFileSync(
                    path.join(sourceDir, 'bin', 'create-hsi-app.mjs'),
                    path.join(outputDir, 'bin', 'create-hsi-app.mjs')
                  );

                  const packageJsonPath = path.join(sourceDir, 'package.json');
                  const packageJson = JSON.parse(fs.readFileSync(packageJsonPath, 'utf8'));

                  packageJson.name = '@hsiii/create-hsi-app';
                  packageJson.repository = {
                    type: 'git',
                    url: 'git+https://github.com/Hsiii/frontend-template.git'
                  };
                  packageJson.publishConfig = {
                    registry: 'https://npm.pkg.github.com'
                  };

                  fs.writeFileSync(
                    path.join(outputDir, 'package.json'),
                    `${JSON.stringify(packageJson, null, 4)}\n`
                  );
                  EOF

            - name: Publish scoped package
              run: npm publish
              working-directory: .tmp-github-create-hsi-app
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    delete-legacy-package:
        runs-on: ubuntu-latest
        steps:
            - name: Delete legacy package if present
              uses: actions/github-script@v7
              with:
                  script: |
                      const owner = context.repo.owner;
                      const { data: packages } = await github.request(
                        'GET /users/{username}/packages',
                        {
                          username: owner,
                          package_type: 'npm',
                          per_page: 100
                        }
                      );

                      core.info(`Packages: ${packages.map((pkg) => pkg.name).join(', ')}`);

                      const legacyPackages = packages.filter((pkg) => {
                        return (
                          pkg.name === 'hsi-app' ||
                          pkg.name === '@hsiii/hsi-app' ||
                          pkg.name.endsWith('/hsi-app')
                        );
                      });

                      if (legacyPackages.length === 0) {
                        core.info('No legacy hsi-app package found.');
                        return;
                      }

                      for (const legacyPackage of legacyPackages) {
                        core.info(`Deleting legacy package ${legacyPackage.name}`);
                        await github.request(
                          'DELETE /users/{username}/packages/{package_type}/{package_name}',
                          {
                            username: owner,
                            package_type: 'npm',
                            package_name: legacyPackage.name
                          }
                        );
                      }
